<div class="confirm-overlay" *ngIf="show" (click)="cancel()">
  <div class="confirm-dialog" (click)="$event.stopPropagation()">
    <div class="confirm-header" [ngClass]="options.type || 'warning'">
      <div class="icon-container">
        <i [class]="options.icon || 'pi pi-exclamation-triangle'"></i>
      </div>
      <h3>{{ options.title }}</h3>
    </div>
    <div class="confirm-body" [ngClass]="{'has-list': messageLines.length > 1}">
      <p *ngIf="messageLines.length === 1">{{ options.message }}</p>
      <ul class="error-list" *ngIf="messageLines.length > 1">
        <li *ngFor="let line of messageLines">{{ line }}</li>
      </ul>
    </div>
    <div class="confirm-footer">
      <button class="btn-cancel" *ngIf="!options.isAlert" (click)="cancel()">
        {{ options.cancelText || ('common.cancel' | t) }}
      </button>
      <button class="btn-confirm" [ngClass]="options.type || 'warning'" (click)="confirm()">
        <ng-container *ngIf="options.isAlert">{{ options.confirmText || 'OK' }}</ng-container>
        <ng-container *ngIf="!options.isAlert">{{ options.confirmText || ('common.confirm' | t) }}</ng-container>
      </button>
    </div>
  </div>
</div>
